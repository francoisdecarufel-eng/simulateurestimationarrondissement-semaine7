<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulateur Mathématique : L'Arrondi Interactif</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Configuration Babel Corrigée -->
    <script>
      Babel.registerPreset('react-classic', {
        presets: [
          [Babel.availablePresets['react'], { runtime: 'classic' }]
        ]
      });
    </script>
    
    <style>
        body { background-color: #FEF3C7; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        @keyframes bounce-slight { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .animate-bounce-slight { animation: bounce-slight 1.2s ease-in-out infinite; }
        .ball-transition { transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 24px;
            width: 24px;
            border-radius: 50%;
            background: #ea580c;
            cursor: pointer;
            border: 3px solid white;
            box-shadow: 0 0 5px rgba(0,0,0,0.2);
        }
        .refresh-btn:active { transform: rotate(180deg); transition: transform 0.3s; }
        @keyframes shake {
            0%, 100% { transform: translateX(-50%); }
            25% { transform: translateX(calc(-50% - 5px)); }
            75% { transform: translateX(calc(-50% + 5px)); }
        }
        .animate-shake { animation: shake 0.4s ease-in-out; }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-5px); }
        }
        .animate-float { animation: float 3s ease-in-out infinite; }
    </style>
</head>
<body class="text-amber-900 min-h-screen">
    <div id="root"></div>

    <script type="text/babel" data-presets="react-classic">
        const { useState, useEffect } = React;

        // --- COMPOSANT SELECTEUR DE NIVEAU ---
        const RoundingSelector = ({ level, setLevel }) => {
            const options = [
                { label: 'Dizaine', value: 10 },
                { label: 'Centaine', value: 100 },
                { label: 'Unité de Mille', value: 1000 }
            ];
            return (
                <div className="flex bg-orange-100 p-1 rounded-xl mb-6 w-full max-w-md mx-auto shadow-inner border border-orange-200">
                    {options.map(opt => (
                        <button 
                            key={opt.value}
                            onClick={() => setLevel(opt.value)}
                            className={`flex-1 py-3 rounded-lg text-xs font-black uppercase transition-all ${level === opt.value ? 'bg-white text-orange-600 shadow-md scale-105 border border-orange-200' : 'text-orange-900/50 hover:text-orange-900'}`}
                        >
                            {opt.label}
                        </button>
                    ))}
                </div>
            );
        };

        // --- NOUVEAUX COMPOSANTS MODALS ---
        const TeacherGuideModal = ({ onClose }) => (
            <div className="fixed inset-0 bg-black/60 z-[100] flex items-center justify-center p-4 backdrop-blur-sm">
                <div className="bg-white rounded-3xl max-w-2xl w-full shadow-2xl relative overflow-hidden border-4 border-orange-300">
                    <div className="bg-orange-600 p-4 text-center">
                        <h2 className="text-3xl font-black text-white uppercase tracking-wider">Guide du Maître</h2>
                    </div>
                    <div className="p-8 space-y-6 text-gray-800 font-medium">
                        <div className="bg-orange-50 p-4 rounded-xl border border-orange-100">
                            <h3 className="text-xl font-black text-orange-800 mb-2 flex items-center gap-2"><span>🎬</span> Animer l'activité</h3>
                            <p>Utilisez le bouton <strong>"▶ Démo"</strong> présent dans chaque section pour faire une démonstration automatique au tableau interactif avant de faire participer les élèves de façon autonome.</p>
                        </div>
                        <div className="bg-green-50 p-4 rounded-xl border border-green-100">
                            <h3 className="text-xl font-black text-green-800 mb-2 flex items-center gap-2"><span>🧺</span> Section Estimation</h3>
                            <p>Le bouton <strong>"Voir les Stratégies"</strong> permet de visualiser des techniques de dénombrement rapide. Montrez aux élèves comment les objets s'organisent en paquets (par 2, 5 ou 10) ou comment compter par bonds.</p>
                        </div>
                        <div className="bg-blue-50 p-4 rounded-xl border border-blue-100">
                            <h3 className="text-xl font-black text-blue-800 mb-2 flex items-center gap-2"><span>🏔️</span> Section Arrondissement</h3>
                            <p>La ligne numérique et la colline concrétisent la règle d'arrondi. Appuyez sur <strong>"ℹ️ Explications"</strong> pour afficher le rappel de la règle officielle d'arrondissement avec vos élèves (0-4 on reste, 5-9 on monte).</p>
                        </div>
                    </div>
                    <div className="p-4 bg-gray-50 text-center border-t border-gray-100">
                        <button onClick={onClose} className="bg-orange-600 hover:bg-orange-700 text-white font-black py-3 px-10 rounded-xl shadow-md transition-all active:scale-95">FERMER</button>
                    </div>
                </div>
            </div>
        );

        const RoundingExplanationModal = ({ onClose, level }) => (
            <div className="fixed inset-0 bg-black/60 z-[100] flex items-center justify-center p-4 backdrop-blur-sm">
                <div className="bg-white rounded-3xl max-w-md w-full shadow-2xl overflow-hidden border-4 border-blue-300">
                    <div className="bg-blue-600 p-4 text-center">
                        <h2 className="text-2xl font-black text-white uppercase tracking-wider">Règle de l'Arrondi</h2>
                    </div>
                    <div className="p-6">
                        <p className="mb-4 text-gray-700 font-bold text-center">Pour arrondir à la <span className="text-blue-600 uppercase font-black">{level === 10 ? 'dizaine' : level === 100 ? 'centaine' : 'unité de mille'}</span> près, on regarde le chiffre juste à sa droite :</p>
                        <div className="space-y-3">
                            <div className="bg-blue-50 p-4 rounded-xl border-2 border-blue-100 flex items-center gap-4">
                                <span className="text-3xl font-black text-blue-500">0..4</span>
                                <p className="text-sm font-bold text-blue-900 leading-tight">Le chiffre est entre 0 et 4 ?<br/><span className="text-blue-600">On reste à la borne inférieure.</span></p>
                            </div>
                            <div className="bg-green-50 p-4 rounded-xl border-2 border-green-100 flex items-center gap-4">
                                <span className="text-3xl font-black text-green-500">5..9</span>
                                <p className="text-sm font-bold text-green-900 leading-tight">Le chiffre est 5 ou plus ?<br/><span className="text-green-600">On passe à la borne supérieure.</span></p>
                            </div>
                        </div>
                    </div>
                    <div className="p-4 bg-gray-50 text-center border-t border-gray-100">
                        <button onClick={onClose} className="bg-blue-600 hover:bg-blue-700 text-white font-black py-3 px-10 rounded-xl shadow-md transition-all active:scale-95">J'AI COMPRIS !</button>
                    </div>
                </div>
            </div>
        );

        // --- COMPOSANT STRATÉGIES (OVERLAY ESTIMATION) ---
        const StrategiesOverlay = ({ items, activeStrategy, targetCount }) => {
            const renderBoxes = (size, borderColor, bgColor, textColor) => {
                const groups = [];
                for (let i = 0; i < items.length; i += size) groups.push(items.slice(i, i + size));
                return groups.map((group, idx) => {
                    const isComplete = group.length === size;
                    const minL = Math.min(...group.map(it => it.rawLeft)) - 3.5;
                    const maxL = Math.max(...group.map(it => it.rawLeft)) + 3.5;
                    const minT = Math.min(...group.map(it => it.rawTop)) - 6;
                    const maxT = Math.max(...group.map(it => it.rawTop)) + 6;
                    
                    return (
                        <div key={idx} className={`absolute border-4 rounded-2xl pointer-events-none z-20 transition-all duration-500 ${isComplete ? bgColor : 'border-dashed border-gray-400 bg-gray-100/30'}`}
                             style={{ left: `${minL}%`, top: `${minT}%`, width: `${maxL - minL}%`, height: `${maxT - minT}%`, borderColor: isComplete ? borderColor : '' }}>
                            <div className={`absolute top-0 right-0 transform translate-x-1/2 -translate-y-1/2 ${textColor} text-white text-[10px] font-black w-6 h-6 flex items-center justify-center rounded-full border-2 border-white shadow-md`}>
                                {isComplete ? (idx + 1) * size : targetCount}
                            </div>
                        </div>
                    );
                });
            };

            if (activeStrategy === 'group2') return renderBoxes(2, '#a855f7', 'bg-purple-500/20', 'bg-purple-600');
            if (activeStrategy === 'group5') return renderBoxes(5, '#3b82f6', 'bg-blue-500/20', 'bg-blue-600');
            if (activeStrategy === 'group10') return renderBoxes(10, '#ea580c', 'bg-orange-500/20', 'bg-orange-600');
            
            if (activeStrategy === 'bonds') {
                const lines = [];
                for (let i = 0; i < items.length - 1; i += 2) {
                    lines.push(
                        <line key={i} x1={`${items[i].rawLeft}%`} y1={`${items[i].rawTop}%`} x2={`${items[i+1].rawLeft}%`} y2={`${items[i+1].rawTop}%`} stroke="#22c55e" strokeWidth="4" strokeLinecap="round" className="opacity-80" />
                    );
                }
                return (
                    <div className="absolute inset-0 pointer-events-none z-10">
                        <svg className="w-full h-full overflow-visible">{lines}</svg>
                        {items.map((it, idx) => {
                            if (idx % 2 === 1 || idx === items.length - 1) {
                                return (
                                    <div key={idx} className="absolute bg-green-600 text-white font-black text-[10px] px-1.5 py-0.5 rounded-full transform -translate-x-1/2 -translate-y-full shadow-md" style={{ left: `${it.rawLeft}%`, top: `${it.rawTop - 2}%` }}>
                                        {idx + 1}
                                    </div>
                                );
                            }
                            return null;
                        })}
                    </div>
                );
            }
            return null;
        };

        // --- MODE 1: ESTIMATION ---
        const EstimationMode = () => {
            const [targetCount, setTargetCount] = useState(24);
            const [userGuess, setUserGuess] = useState('');
            const [gameState, setGameState] = useState('guessing');
            const [items, setItems] = useState([]);
            const [showStrategies, setShowStrategies] = useState(false);
            const [activeStrategy, setActiveStrategy] = useState('group10');
            const [isDemo, setIsDemo] = useState(false);

            const generateGame = () => {
                const count = Math.floor(Math.random() * 25) + 15; // 15 à 40
                setTargetCount(count);
                setGameState('start');
                setUserGuess('');
                setShowStrategies(false);
                
                const newItems = Array.from({length: count}).map((_, i) => {
                    const row = Math.floor(i / 10);
                    const col = i % 10;
                    return {
                        id: i,
                        rawLeft: 11.75 + col * 8.5,
                        rawTop: 16 + row * 23,
                        rotation: `${Math.random()*30-15}deg`
                    }
                });
                setItems(newItems);
            };

            useEffect(() => { generateGame(); }, []);

            const runDemo = () => {
                if (isDemo) return;
                setIsDemo(true);
                generateGame();
                setTimeout(() => {
                    setGameState('memorizing');
                    setTimeout(() => {
                        setGameState('guessing');
                        setUserGuess('?');
                        setTimeout(() => {
                            setShowStrategies(true);
                            setActiveStrategy('group10');
                            setTimeout(() => {
                                setGameState('result');
                                setIsDemo(false);
                            }, 3000);
                        }, 1500);
                    }, 7000);
                }, 500);
            };

            const startGame = () => {
                setGameState('memorizing');
                setTimeout(() => setGameState('guessing'), 7000);
            };

            return (
                <div className="flex flex-col items-center w-full p-6 bg-white rounded-3xl shadow-xl border-2 border-orange-50">
                    <div className="flex justify-between items-start w-full mb-2">
                        <button onClick={runDemo} disabled={isDemo} className="bg-purple-100 text-purple-700 hover:bg-purple-200 px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest transition-colors flex items-center gap-1 disabled:opacity-50">
                            ▶ Démo
                        </button>
                        <div className="text-center">
                            <h3 className="text-xl font-black text-orange-900 uppercase">Estime la quantité</h3>
                            <p className="text-xs text-orange-700 italic">Combien de pommes vois-tu ?</p>
                        </div>
                        <button onClick={generateGame} disabled={isDemo} className="bg-orange-100 text-orange-700 hover:bg-orange-200 px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest transition-colors disabled:opacity-50">
                            🔄 Nouveau
                        </button>
                    </div>
                    
                    <div className="relative w-full h-64 bg-orange-50/50 rounded-2xl border-4 border-orange-100 overflow-hidden mb-6 mt-4">
                        {gameState === 'start' && !isDemo && (
                            <div className="absolute inset-0 flex flex-col items-center justify-center bg-orange-900/90 text-white z-50 p-6 text-center">
                                <h3 className="text-2xl font-black mb-4 uppercase">Prêt ?</h3>
                                <button onClick={startGame} className="bg-orange-500 hover:bg-orange-400 text-white font-black py-3 px-10 rounded-2xl shadow-[0_4px_0_rgb(194,65,12)] active:translate-y-1 active:shadow-none transition-all uppercase text-sm">
                                    Observer (7s)
                                </button>
                            </div>
                        )}

                        {(gameState === 'memorizing' || gameState === 'revealed' || gameState === 'result' || showStrategies) && (
                            <div className="absolute inset-0">
                                {items.map(it => (
                                    <div key={it.id} className="absolute z-10 flex items-center justify-center w-10 h-10 transition-all duration-300"
                                         style={{ left: `${it.rawLeft}%`, top: `${it.rawTop}%`, transform: `translate(-50%, -50%) rotate(${it.rotation})`, fontSize: '28px' }}>
                                        🍎
                                    </div>
                                ))}
                                {showStrategies && <StrategiesOverlay items={items} activeStrategy={activeStrategy} targetCount={targetCount} />}
                            </div>
                        )}

                        {(gameState === 'guessing' || gameState === 'error') && !showStrategies && (
                            <div className="absolute inset-0 flex flex-col items-center justify-center bg-amber-50 z-40">
                                <span className="text-7xl animate-bounce-slight">🧺</span>
                                <p className="text-lg font-black text-orange-900 mt-2 uppercase tracking-widest">Temps écoulé</p>
                            </div>
                        )}
                    </div>

                    {!showStrategies ? (
                        <div className="w-full flex flex-col items-center">
                            <div className="flex gap-4 w-full max-w-sm mb-4">
                                <input 
                                    type="text" 
                                    value={userGuess} 
                                    onChange={(e) => setUserGuess(e.target.value)}
                                    disabled={gameState !== 'guessing' && gameState !== 'error'}
                                    className="flex-1 text-center text-3xl font-black border-4 border-orange-100 rounded-2xl outline-none focus:border-orange-400 transition-colors"
                                    placeholder="?"
                                />
                                <button 
                                    onClick={() => setGameState('result')}
                                    disabled={gameState !== 'guessing' && gameState !== 'error'}
                                    className="bg-orange-600 hover:bg-orange-500 disabled:opacity-50 text-white px-8 py-4 rounded-2xl font-black shadow-lg active:scale-95 transition-all"
                                >OK</button>
                            </div>
                            <button onClick={() => setShowStrategies(true)} disabled={isDemo} className="bg-green-600 hover:bg-green-500 text-white font-black py-3 px-8 rounded-xl text-xs uppercase tracking-widest shadow-md transition-colors w-full max-w-sm disabled:opacity-50">
                                Voir les Stratégies
                            </button>
                            {gameState === 'result' && (
                                <div className="mt-4 p-4 bg-amber-50 border-2 border-amber-200 rounded-2xl text-center w-full max-w-sm animate-float">
                                    <p className="font-bold text-orange-900">Total exact : <span className="text-2xl font-black">{targetCount}</span></p>
                                </div>
                            )}
                        </div>
                    ) : (
                        <div className="w-full flex flex-col items-center bg-gray-50 p-4 rounded-2xl border-2 border-gray-200">
                            <h4 className="text-xs font-black text-gray-500 uppercase mb-3">Choisis une stratégie visuelle</h4>
                            <div className="grid grid-cols-2 gap-2 w-full max-w-md mb-4">
                                {[
                                    {id: 'group2', label: 'Par 2', color: 'bg-purple-600'},
                                    {id: 'group5', label: 'Par 5', color: 'bg-blue-600'},
                                    {id: 'group10', label: 'Par 10', color: 'bg-orange-600'},
                                    {id: 'bonds', label: 'Par Bonds', color: 'bg-green-600'}
                                ].map(s => (
                                    <button key={s.id} onClick={() => setActiveStrategy(s.id)} className={`py-3 rounded-xl text-[10px] font-black uppercase transition-all ${activeStrategy === s.id ? `${s.color} text-white shadow-inner scale-95 border border-black/10` : 'bg-white text-gray-600 border border-gray-300 shadow-sm'}`}>
                                        {s.label}
                                    </button>
                                ))}
                            </div>
                            <button onClick={() => setShowStrategies(false)} className="bg-gray-300 hover:bg-gray-400 text-gray-800 font-black py-3 px-8 rounded-xl text-[10px] uppercase transition-colors w-full max-w-md">
                                Retour au jeu
                            </button>
                        </div>
                    )}
                </div>
            );
        };

        // --- MODE 2: LIGNE NUMÉRIQUE ---
        const NumberLineMode = ({ roundingLevel }) => {
            const generateRandomVal = () => Math.floor(Math.random() * 8900) + 100; 

            const [baseVal, setBaseVal] = useState(246);
            const [val, setVal] = useState(246);
            const [showExplanations, setShowExplanations] = useState(false);
            const [isDemo, setIsDemo] = useState(false);
            
            const lowerBound = Math.floor(baseVal / roundingLevel) * roundingLevel;
            const upperBound = lowerBound + roundingLevel;
            const midPoint = lowerBound + (roundingLevel / 2);
            
            const correctAnswer = baseVal >= midPoint ? upperBound : lowerBound;
            const wrongAnswer = baseVal >= midPoint ? lowerBound : upperBound;
            
            const isSuccess = val === correctAnswer;
            const isError = val === wrongAnswer;
            const isCloserToUpper = val >= midPoint;

            const refresh = () => {
                const newVal = generateRandomVal();
                setBaseVal(newVal);
                setVal(newVal);
            };

            useEffect(() => {
                setVal(baseVal);
            }, [roundingLevel]);

            const runDemo = () => {
                if(isDemo) return;
                setIsDemo(true);
                setVal(baseVal);
                let current = baseVal;
                const target = correctAnswer;
                const step = (target - baseVal) / 20;
                
                const interval = setInterval(() => {
                    current += step;
                    if ((step > 0 && current >= target) || (step < 0 && current <= target)) {
                        setVal(target);
                        clearInterval(interval);
                        setIsDemo(false);
                    } else {
                        setVal(current);
                    }
                }, 100);
            };

            const getLowerBoundClass = () => {
                if (val === lowerBound) return isSuccess ? 'bg-green-100 border-green-500 scale-110 shadow-lg text-green-900' : 'bg-red-100 border-red-500 scale-105 shadow-md text-red-900';
                return !isCloserToUpper ? 'bg-blue-100 border-blue-400 scale-105 shadow-md text-blue-900' : 'bg-gray-50 border-transparent opacity-40 text-gray-500';
            };

            const getUpperBoundClass = () => {
                if (val === upperBound) return isSuccess ? 'bg-green-100 border-green-500 scale-110 shadow-lg text-green-900' : 'bg-red-100 border-red-500 scale-105 shadow-md text-red-900';
                return isCloserToUpper ? 'bg-blue-100 border-blue-400 scale-105 shadow-md text-blue-900' : 'bg-gray-50 border-transparent opacity-40 text-gray-500';
            };

            return (
                <div className="flex flex-col items-center p-6 bg-white rounded-3xl shadow-xl border-2 border-orange-50">
                    <div className="flex justify-between items-start w-full mb-4">
                        <button onClick={runDemo} disabled={isDemo} className="bg-purple-100 text-purple-700 hover:bg-purple-200 px-3 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest transition-colors flex items-center gap-1 disabled:opacity-50">
                            ▶ Démo
                        </button>
                        <div className="text-center">
                            <h3 className="text-xl font-black text-orange-900 uppercase italic">Ligne numérique</h3>
                        </div>
                        <button onClick={() => setShowExplanations(true)} className="bg-blue-100 text-blue-700 hover:bg-blue-200 px-3 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest transition-colors flex items-center gap-1">
                            ℹ️ Explications
                        </button>
                    </div>
                    
                    <div className="mb-6 flex flex-col items-center">
                        <div className="flex items-center gap-3 bg-orange-50/50 px-6 py-2 rounded-2xl border-4 border-orange-100 shadow-inner">
                           <span className="text-xs font-black text-orange-400 uppercase tracking-widest">Nombre :</span>
                           <div className="w-28 bg-white border-2 border-orange-200 rounded-xl px-2 py-1 text-2xl font-black text-orange-700 text-center shadow-sm">
                               {baseVal}
                           </div>
                           <button onClick={refresh} title="Nouveau nombre aléatoire" className="refresh-btn p-2 bg-orange-100 text-orange-600 rounded-full hover:bg-orange-200 transition-colors ml-2">
                               <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M3 21v-5h5"/></svg>
                           </button>
                        </div>
                    </div> 

                    <div className="relative w-full h-40 flex items-center px-10 mt-6">
                        <div className="absolute inset-x-10 h-20 flex rounded-2xl overflow-hidden opacity-15">
                            <div className="h-full bg-blue-500" style={{ width: '50%' }}></div>
                            <div className="h-full bg-green-500" style={{ width: '50%' }}></div>
                        </div>

                        <div className="h-2 w-full bg-gray-300 rounded-full relative">
                            {Array.from({length: 11}).map((_, i) => {
                                const stepValue = lowerBound + (i * (roundingLevel / 10));
                                const isMajor = i === 0 || i === 5 || i === 10;
                                return (
                                    <div key={i} className="absolute flex flex-col items-center" style={{ left: `${i*10}%`, transform: 'translateX(-50%)' }}>
                                        <div className={`w-1 ${isMajor ? 'h-8 bg-gray-600' : 'h-4 bg-gray-400'} mb-2`}></div>
                                        {isMajor && <span className="text-xs font-black text-gray-500">{stepValue}</span>}
                                    </div>
                                );
                            })}

                            <div className="absolute top-[-60px] ball-transition flex flex-col items-center" 
                                 style={{ left: `${((val - lowerBound) / roundingLevel) * 100}%`, transform: 'translateX(-50%)' }}>
                                <div className="bg-orange-600 text-white text-[12px] font-black px-3 py-1.5 rounded-lg shadow-lg mb-2 relative">
                                    {Math.round(val)}
                                    {isSuccess && (
                                        <div className="absolute -top-10 left-1/2 -translate-x-1/2 bg-green-500 text-white text-[10px] px-3 py-1 rounded-lg shadow-md whitespace-nowrap animate-bounce-slight">
                                            ✨ Exact !
                                            <div className="absolute -bottom-1 left-1/2 -translate-x-1/2 w-2 h-2 bg-green-500 rotate-45"></div>
                                        </div>
                                    )}
                                    {isError && (
                                        <div className="absolute -top-10 left-1/2 -translate-x-1/2 bg-red-500 text-white text-[10px] px-3 py-1 rounded-lg shadow-md whitespace-nowrap animate-shake">
                                            ❌ Mauvaise borne
                                            <div className="absolute -bottom-1 left-1/2 -translate-x-1/2 w-2 h-2 bg-red-500 rotate-45"></div>
                                        </div>
                                    )}
                                </div>
                                <div className="w-10 h-10 bg-white border-4 border-orange-600 rounded-full shadow-lg flex items-center justify-center cursor-grab active:cursor-grabbing">
                                    <span className="text-xl">🍎</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className="grid grid-cols-3 w-full gap-4 mt-8">
                        <div className={`p-4 rounded-2xl text-center border-4 transition-all duration-300 ${getLowerBoundClass()}`}>
                            <span className="block text-[9px] font-bold uppercase tracking-wider">Borne Inférieure</span>
                            <span className="text-2xl font-black">{lowerBound}</span>
                        </div>
                        <div className="flex flex-col items-center justify-center">
                            <span className="text-xs font-bold text-gray-400 uppercase tracking-widest mb-1">On arrondit à</span>
                            <span className="text-3xl font-black text-orange-500">
                                {!isCloserToUpper ? "←" : "→"}
                            </span>
                        </div>
                        <div className={`p-4 rounded-2xl text-center border-4 transition-all duration-300 ${getUpperBoundClass()}`}>
                            <span className="block text-[9px] font-bold uppercase tracking-wider">Borne Supérieure</span>
                            <span className="text-2xl font-black">{upperBound}</span>
                        </div>
                    </div>

                    <input 
                        type="range" 
                        min={lowerBound} 
                        max={upperBound} 
                        step={1}
                        value={val} 
                        onChange={(e) => setVal(parseFloat(e.target.value))}
                        className="w-full mt-10 h-3 bg-orange-100 rounded-lg appearance-none cursor-pointer"
                    />
                    <p className="mt-4 text-[10px] font-bold text-gray-400 uppercase italic">Déplace la pomme vers la bonne borne</p>
                    
                    {showExplanations && <RoundingExplanationModal onClose={() => setShowExplanations(false)} level={roundingLevel} />}
                </div>
            );
        };

        // --- MODE 3: COLLINE ---
        const HillMode = ({ roundingLevel }) => {
            const generateRandomVal = () => Math.floor(Math.random() * 8900) + 100;

            const [baseVal, setBaseVal] = useState(246);
            const [val, setVal] = useState(246);
            const [showExplanations, setShowExplanations] = useState(false);
            const [isDemo, setIsDemo] = useState(false);
            
            const lowerBound = Math.floor(baseVal / roundingLevel) * roundingLevel;
            const upperBound = lowerBound + roundingLevel;
            const midPoint = lowerBound + (roundingLevel / 2);
            
            const correctAnswer = baseVal >= midPoint ? upperBound : lowerBound;
            const wrongAnswer = baseVal >= midPoint ? lowerBound : upperBound;
            const isSuccess = val === correctAnswer;
            const isError = val === wrongAnswer;
            
            const rawT = (val - lowerBound) / roundingLevel;
            const t = Math.max(0, Math.min(1, rawT));
            
            // Équation exacte alignée avec le tracé SVG: M 20 110 Q 100 20 180 110
            const hillY_svg = Math.pow(1 - t, 2) * 110 + 2 * (1 - t) * t * 20 + Math.pow(t, 2) * 110;
            // Conversion de la coordonnée SVG en pourcentage Bottom CSS
            const bottomPercent = ((120 - hillY_svg) / 120) * 100;
            // L'axe X du SVG va de 20 (soit 10%) à 180 (soit 90%)
            const leftPercent = 10 + t * 80;
            
            const isClimbing = val < midPoint;

            const refresh = () => {
                const newVal = generateRandomVal();
                setBaseVal(newVal);
                setVal(newVal);
            };

            useEffect(() => {
                setVal(baseVal);
            }, [roundingLevel]);

            const runDemo = () => {
                if(isDemo) return;
                setIsDemo(true);
                setVal(baseVal);
                let current = baseVal;
                const target = correctAnswer;
                const step = (target - baseVal) / 20;
                
                const interval = setInterval(() => {
                    current += step;
                    if ((step > 0 && current >= target) || (step < 0 && current <= target)) {
                        setVal(target);
                        clearInterval(interval);
                        setIsDemo(false);
                    } else {
                        setVal(current);
                    }
                }, 100);
            };

            const getLowerBoundClass = () => {
                if (val === lowerBound) return isSuccess ? 'bg-green-100 border-green-500 scale-110 shadow-lg text-green-900' : 'bg-red-100 border-red-500 scale-105 shadow-md text-red-900';
                return 'bg-white/80 border-blue-200 text-blue-900';
            };

            const getUpperBoundClass = () => {
                if (val === upperBound) return isSuccess ? 'bg-green-100 border-green-500 scale-110 shadow-lg text-green-900' : 'bg-red-100 border-red-500 scale-105 shadow-md text-red-900';
                return 'bg-white/80 border-green-200 text-green-900';
            };

            return (
                <div className="flex flex-col items-center p-6 bg-white rounded-3xl shadow-xl border-2 border-orange-50 overflow-hidden">
                    <div className="flex justify-between items-start w-full mb-4">
                        <button onClick={runDemo} disabled={isDemo} className="bg-purple-100 text-purple-700 hover:bg-purple-200 px-3 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest transition-colors flex items-center gap-1 disabled:opacity-50">
                            ▶ Démo
                        </button>
                        <div className="text-center">
                            <h3 className="text-xl font-black text-orange-900 uppercase italic">Colline de l'Arrondi</h3>
                        </div>
                        <button onClick={() => setShowExplanations(true)} className="bg-blue-100 text-blue-700 hover:bg-blue-200 px-3 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest transition-colors flex items-center gap-1">
                            ℹ️ Explications
                        </button>
                    </div>
                    
                    <div className="mb-6 flex flex-col items-center">
                        <div className="flex items-center gap-3 bg-orange-50/50 px-6 py-2 rounded-2xl border-4 border-orange-100 shadow-inner">
                           <span className="text-xs font-black text-orange-400 uppercase tracking-widest">Nombre :</span>
                           <div className="w-28 bg-white border-2 border-orange-200 rounded-xl px-2 py-1 text-2xl font-black text-orange-700 text-center shadow-sm">
                               {baseVal}
                           </div>
                           <button onClick={refresh} title="Nouveau nombre" className="refresh-btn p-2 bg-orange-100 text-orange-600 rounded-full hover:bg-orange-200 transition-colors ml-2">
                               <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M3 21v-5h5"/></svg>
                           </button>
                        </div>
                    </div>

                    <div className="relative w-full h-56 flex items-center justify-center bg-gradient-to-b from-sky-50 to-white rounded-2xl border border-sky-100 mb-4">
                        <svg viewBox="0 0 200 120" className="absolute bottom-0 w-full h-full overflow-visible z-0">
                            <path d="M 20 110 Q 100 20 180 110" fill="none" stroke="#dcfce7" strokeWidth="16" strokeLinecap="round" />
                            <path d="M 20 110 Q 100 20 180 110" fill="none" stroke="#22c55e" strokeWidth="3" strokeDasharray="6 4" />
                            <line x1="100" y1="20" x2="100" y2="110" stroke="#f97316" strokeWidth="1.5" strokeDasharray="3 3" />
                        </svg>

                        {/* La Pomme est séparée de son étiquette pour être plus précise sur la ligne */}
                        <div className="absolute z-20 ball-transition flex flex-col items-center" 
                             style={{ 
                                left: `${leftPercent}%`, 
                                bottom: `${bottomPercent}%`,
                                transform: `translate(-50%, 0)`
                             }}>
                            {/* Étiquettes au-dessus de la pomme */}
                            <div className="absolute bottom-full mb-1 flex flex-col items-center">
                                {isSuccess && (
                                    <div className="bg-green-500 text-white text-[10px] px-3 py-1 rounded-lg shadow-md whitespace-nowrap animate-bounce-slight z-30 mb-1">
                                        ✨ Exact !
                                        <div className="absolute -bottom-1 left-1/2 -translate-x-1/2 w-2 h-2 bg-green-500 rotate-45"></div>
                                    </div>
                                )}
                                {isError && (
                                    <div className="bg-red-500 text-white text-[10px] px-3 py-1 rounded-lg shadow-md whitespace-nowrap animate-shake z-30 mb-1">
                                        ❌ Erreur !
                                        <div className="absolute -bottom-1 left-1/2 -translate-x-1/2 w-2 h-2 bg-red-500 rotate-45"></div>
                                    </div>
                                )}
                                <div className="bg-white px-2 py-0.5 rounded-full border-2 border-orange-400 text-xs font-black shadow-md">
                                    {Math.round(val)}
                                </div>
                            </div>
                            
                            {/* La pomme physique tourne autour de son centre */}
                            <span className="text-4xl drop-shadow-xl inline-block" style={{ transform: `rotate(${t * 360}deg)` }}>🍎</span>
                        </div>

                        <div className="absolute bottom-2 left-4 text-center z-10">
                            <span className="text-[10px] font-black text-blue-600 block leading-tight">ARRONDI<br/>INFÉRIEUR</span>
                            <span className={`text-lg font-black px-2 py-1 rounded-lg border-2 inline-block mt-1 transition-all ${getLowerBoundClass()}`}>{lowerBound}</span>
                        </div>
                        <div className="absolute bottom-2 right-4 text-center z-10">
                            <span className="text-[10px] font-black text-green-600 block leading-tight">ARRONDI<br/>SUPÉRIEUR</span>
                            <span className={`text-lg font-black px-2 py-1 rounded-lg border-2 inline-block mt-1 transition-all ${getUpperBoundClass()}`}>{upperBound}</span>
                        </div>
                    </div>

                    <div className="w-full mt-4 flex flex-col items-center">
                        <div className="flex items-center gap-4 mb-4 w-full px-4">
                            <button onClick={() => setVal(v => Math.max(lowerBound, v - 1))} className="w-14 h-14 bg-gray-100 rounded-2xl font-black text-2xl shadow hover:bg-gray-200 transition-colors active:scale-95 shrink-0">-</button>
                            <input 
                                type="range" 
                                min={lowerBound} max={upperBound} step={1}
                                value={val} onChange={(e) => setVal(parseFloat(e.target.value))}
                                className="w-full h-3 bg-orange-100 rounded-lg appearance-none cursor-pointer"
                            />
                            <button onClick={() => setVal(v => Math.min(upperBound, val + 1))} className="w-14 h-14 bg-orange-600 text-white rounded-2xl font-black text-2xl shadow-lg hover:bg-orange-500 transition-colors active:scale-95 shrink-0">+</button>
                        </div>

                        <div className={`w-full p-4 rounded-2xl text-center font-black transition-all border-4 shadow-sm text-lg ${isClimbing ? 'bg-blue-50 text-blue-700 border-blue-300' : 'bg-green-50 text-green-700 border-green-300'}`}>
                            {isClimbing ? 
                                `La pomme redescend vers ${lowerBound}.` : 
                                `La pomme roule vers ${upperBound} !`
                            }
                        </div>
                    </div>
                    {showExplanations && <RoundingExplanationModal onClose={() => setShowExplanations(false)} level={roundingLevel} />}
                </div>
            );
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('estimation');
            const [roundingLevel, setRoundingLevel] = useState(10); 
            const [showGuide, setShowGuide] = useState(false);

            return (
                <div className="container mx-auto px-4 py-8 max-w-3xl relative">
                    <header className="mb-8 mt-4">
                        <div className="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
                            <div className="inline-block bg-orange-200/50 px-5 py-2.5 rounded-full text-orange-900 font-black text-[10px] uppercase tracking-[0.2em] border border-orange-200 shadow-sm">
                                 Outil de visualisation Mathématique
                            </div>
                            <button onClick={() => setShowGuide(true)} className="bg-orange-800 hover:bg-orange-900 text-white px-6 py-2.5 rounded-full font-black text-[11px] uppercase tracking-widest shadow-md flex items-center gap-2 border-2 border-orange-300/30 transition-all active:scale-95">
                                🧑‍🏫 Guide du Maître
                            </button>
                        </div>
                        
                        <h1 className="text-5xl font-black text-orange-950 uppercase tracking-tighter leading-none italic mb-10 text-center">
                            Récolte <span className="text-orange-600">Mathématique</span>
                        </h1>
                        
                        <nav className="flex justify-center bg-white rounded-2xl shadow-md p-1 border-4 border-orange-50 mb-8 overflow-hidden max-w-lg mx-auto">
                            {['estimation', 'ligne numérique', 'colline'].map(tab => (
                                <button key={tab} onClick={() => setActiveTab(tab)} 
                                        className={`flex-1 py-4 px-2 rounded-xl font-black text-xs uppercase transition-all ${activeTab === tab ? 'bg-orange-600 text-white shadow-inner scale-105' : 'text-orange-900/40 hover:text-orange-900 hover:bg-orange-50'}`}>
                                    {tab}
                                </button>
                            ))}
                        </nav>

                        {activeTab !== 'estimation' && (
                            <div className="animate-float">
                                <RoundingSelector level={roundingLevel} setLevel={setRoundingLevel} />
                            </div>
                        )}
                    </header>

                    <main className="min-h-[500px]">
                        {activeTab === 'estimation' && <EstimationMode />}
                        {activeTab === 'ligne numérique' && <NumberLineMode roundingLevel={roundingLevel} />}
                        {activeTab === 'colline' && <HillMode roundingLevel={roundingLevel} />}
                    </main>

                    <footer className="mt-16 text-center text-orange-900/40 text-[10px] font-black uppercase tracking-widest border-t-2 border-orange-100 pt-8">
                        Estimation • Arrondi (Dizaine / Centaine / Unité de mille)
                    </footer>

                    {showGuide && <TeacherGuideModal onClose={() => setShowGuide(false)} />}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
